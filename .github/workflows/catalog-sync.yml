name: catalog-sync

on:
  workflow_dispatch:
    inputs:
      full_refresh:
        description: Ignore saved state and rebuild from scratch
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: catalog-sync
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  scrape_catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore previous raw catalog state
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.full_refresh }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          python "scripts/restore_sync_state.py"
          --repo "${{ github.repository }}"
          --workflow "catalog-sync.yml"
          --branch "${{ github.ref_name }}"
          --artifact-name "catalog-sync-state"
          --artifact-prefix "raw-catalog-"
          --conclusions "success,failure,cancelled"
          --exclude-run-id "${{ github.run_id }}"
          --restore-file "data/raw_catalog.json"
          --verbose

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('README.md', 'scripts/*.py', 'domain/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 "qdrant-client[fastembed]"

      - name: Scrape catalog
        shell: bash
        run: |
          CMD=(
            python "scripts/catalog_scraper.py"
            --save-every 25
            --verbose
            --exclude-slugs "sumki,gift-wrap,sredstva-dlya-stirki,aksessuary-dlya-volos"
          )
          if [[ "${{ github.event_name }}" != "workflow_dispatch" || "${{ inputs.full_refresh }}" != "true" ]]; then
            CMD+=(--resume)
          fi
          "${CMD[@]}"

      - name: Upload raw catalog artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-catalog-${{ github.run_number }}
          retention-days: 14
          path: |
            data/raw_catalog.json

  enrich_catalog:
    needs: scrape_catalog
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore previous enriched catalog state
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.full_refresh }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          python "scripts/restore_sync_state.py"
          --repo "${{ github.repository }}"
          --workflow "catalog-sync.yml"
          --branch "${{ github.ref_name }}"
          --artifact-name "catalog-sync-state"
          --artifact-prefix "enriched-catalog-"
          --conclusions "success,failure,cancelled"
          --exclude-run-id "${{ github.run_id }}"
          --restore-file "data/enriched_catalog.json"
          --verbose

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('README.md', 'scripts/*.py', 'domain/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 "qdrant-client[fastembed]"

      - name: Download raw catalog artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-catalog-${{ github.run_number }}
          path: data

      - name: Enrich INCI
        shell: bash
        run: |
          CMD=(
            python "scripts/inci_enricher.py"
            --save-every 25
            --verbose
          )
          if [[ "${{ github.event_name }}" != "workflow_dispatch" || "${{ inputs.full_refresh }}" != "true" ]]; then
            CMD+=(--resume)
          fi
          "${CMD[@]}"

      - name: Upload enriched catalog artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enriched-catalog-${{ github.run_number }}
          retention-days: 14
          path: |
            data/raw_catalog.json
            data/enriched_catalog.json

  build_and_index:
    needs: enrich_catalog
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: "1"
      QDRANT_URL: ${{ secrets.QDRANT_URL }}
      QDRANT_KEY: ${{ secrets.QDRANT_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('README.md', 'scripts/*.py', 'domain/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 "qdrant-client[fastembed]"

      - name: Download enriched catalog artifact
        uses: actions/download-artifact@v4
        with:
          name: enriched-catalog-${{ github.run_number }}
          path: data

      - name: Load SQLite
        run: python "scripts/load_to_sqlite.py" --verbose

      - name: Index to Qdrant Cloud
        if: ${{ env.QDRANT_URL != '' && env.QDRANT_KEY != '' }}
        shell: bash
        run: |
          CMD=(
            python "scripts/index_to_qdrant.py"
            --qdrant-url "${{ env.QDRANT_URL }}"
            --qdrant-api-key "${{ env.QDRANT_KEY }}"
            --verbose
          )
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.full_refresh }}" == "true" ]]; then
            CMD+=(--recreate)
          fi
          "${CMD[@]}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-sync-${{ github.run_number }}
          retention-days: 14
          path: |
            data/raw_catalog.json
            data/enriched_catalog.json
            sqlite.db

      - name: Upload latest sync state
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-sync-state
          retention-days: 14
          overwrite: true
          path: |
            data/raw_catalog.json
            data/enriched_catalog.json
            sqlite.db
